<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>
    <meta name="description" content="A simple recipe book page with an apple crisp recipe.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="A simple recipe book page with an apple crisp recipe.">
    <meta property="og:url" content="https://harimchoiwork.github.io/wdd131/recipes/recipes.html">
    <meta property="og:image" content="https://harimchoiwork.github.io/wdd131/recipes/images/social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="A simple recipe book page with an apple crisp recipe.">
    <meta name="twitter:image" content="https://harimchoiwork.github.io/wdd131/recipes/images/social-preview-image.png">

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/recipe-book.png" alt="Recipe book icon">
            <h1>RecipeBook</h1>
        </div>

        <form class="search">
            <label for="search-box" class="hide">Search for a recipe</label>
            <input id="search-box" type="text" placeholder="Find a recipe">
            <button type="submit">
                <img src="images/search.svg" alt="search icon">
            </button>
        </form>
    </header>

    <main class="recipes"></main>

    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
    </footer>
</body>
</html>
